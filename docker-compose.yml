      - DISABLE_FLOWISE_TELEMETRY=${DISABLE_FLOWISE_TELEMETRY}
    ports:
      - ${FPORT}:3000
    volumes:
      - flowise:/root/.flowise
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/v1/ping || exit 1"]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 3

x-opencode-base: &opencode-base
    image: ghcr.io/anomalyco/opencode:latest
    hostname: ${codehostname}
    container_name: ${codehostname}
    pull_policy: ${pull_policy}
    restart: ${restart}
    stdin_open: true
    tty: true
    environment:
      - TZ=${TIMEZONE}
#      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME} # uncomment to enable user and password
#      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD} # uncomment to enable user and password
#      - OPENCODE_CONFIG_CONTENT={"$$schema":"https://opencode.ai/config.json","provider":{"ollama":{"npm":"@ai-sdk/openai-compatible","name":"Ollama (local)","options":{"baseURL":"http://${ohostname}:11434/v1"},"models":{"EXAMPLEMODEL:EXAMPLEb":{"name":"EXAMPLE_NAME"}}}}} # uncomment to use with ollama
#      - OPENAI_BASE_URL=https://openrouter.ai/api/v1 # for use with openrouter
#      - OPENAI_API_KEY=${OPENROUTER_API_KEY} # for use with openrouter
#      - OPENAI_API_KEY=${OPENAI_API_KEY} # to use openai	
#      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
#      - GEMINI_API_KEY=${GEMINI_API_KEY}
    ports:
      - ${OCPORT}:${OCPORT}
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - ./opencode-workspace:/workspace
      - config-opencode:/root/.config/opencode
      - state-opencode:/root/.local/state/opencode
      - share-opencode:/root/.local/share/opencode
    working_dir: /workspace
    entrypoint: ["/bin/sh", "-c", "opencode web --hostname 0.0.0.0 --port ${OCPORT}"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4096/global/health > /dev/null || exit 1"]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 3

x-hermes-base: &hermes-base
    image: nousresearch/hermes-agent:latest
    hostname: ${hname}
    container_name: ${hname}
    pull_policy: ${pull_policy}
    restart: ${restart}
    shm_size: "1gb"
    command: gateway run # The following command for hermes cli in case they change the path of the image /opt/hermes/.venv/bin/hermes
    environment:
      - PATH=/root/.local/bin:/opt/data/.local/bin:/opt/hermes/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_HOST=0.0.0.0
      - HERMES_DASHBOARD_PORT=${hdport}
      - HERMES_LOCAL_STT_LANGUAGE=es
      - TZ=${TIMEZONE}
      - HERMES_TIMEZONE=${TIMEZONE}
      - HERMES_DASHBOARD_TUI=1
      - API_SERVER_ENABLED=true
      - API_SERVER_KEY=${hapikey}
      - API_SERVER_PORT=${hapiport}
      - API_SERVER_HOST=0.0.0.0
      - TERMINAL_ENV=local
      - HERMES_DASHBOARD_BASIC_AUTH_USERNAME=${huser}
      - HERMES_DASHBOARD_BASIC_AUTH_PASSWORD=${hpass}
      - HERMES_DASHBOARD_PUBLIC_URL=https://hermes.example.com #change me
      - HERMES_QUIET=true
      - browserless_api_url=http://${broname}:3000
      - browserless_api_documentation=http://${broname}:3000/docs/swagger-ui-init.js
      - learning_browserless=${learning_browserless}
#      - browserless_token=${BROTOKEN}
      - crawl4ai_api_url=http://${crawhostname}:${CRAW1}
      - crawl4ai_api_documentation=http://${crawhostname}:${CRAW1}/openapi.json
      - crawl4ai_token=${CRAWL4AI_API_TOKEN}
      - learning_crawl4ai=${learning_crawl4ai}
      - opencode_api_url=http://${codehostname}:${OCPORT}
      - opencode_api_documentation=http://${codehostname}:${OCPORT}/doc
      - learning_opencode=${learning_opencode}
      - searxng_url=http://${searxnghostname}:8080/
      - searcng_api_documentation=https://docs.searxng.org/dev/search_api.html
      - learning_searxng=${learning_searxng}
#      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
#      - OPENAI_API_KEY=${OPENAI_API_KEY}
#      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
#      - HERMES_OPENROUTER_CACHE=true
#      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
    ports:
      - ${hapiport}:${hapiport}
      - ${hdport}:${hdport}
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - hermes:/opt/data
      - /var/run/docker.sock:/var/run/docker.sock
      - ./opencode-workspace:/workspace
    group_add:
      - ${DOCKER_GID}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:${hapiport}/health"]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 4G

x-browserless-base: &browserless-base
    image: browserless/chrome:latest
    hostname: ${broname}
    container_name: ${broname}
    pull_policy: ${pull_policy}
    restart: ${restart}
#    ports:
#      - 3000:3000
    shm_size: "2gb"
    environment:
#      - TOKEN=${BROTOKEN}
      - MAX_CONCURRENT_SESSIONS=5
      - QUEUE_LENGTH=10
      - DATA_DIR=/user_data
      - TIMEOUT=30000
      - PORT=3000
      - ENABLE_CORS=true
      - CORS_ALLOW_ORIGIN=*
      - CORS_ALLOW_METHODS=all
      - HEALTH=true
      - TZ=${TIMEZONE}
      - ALLOW_GET=true
      - MAX_CPU_PERCENT=85
      - MAX_MEMORY_PERCENT=85
      - LOG_LEVEL=info
      - LOG_FORMAT=json
    volumes:
      - browser_data:/user_data
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:3000/pressure || exit 1"]
#      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:3000/pressure?token=${BROTOKEN} || exit 1"]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 3

################################################

volumes:
  ollama:
  openwebui:
  n8n_storage:
  n8n_backup:
  n8n_shared:
  postgres:
  redis:
  qdrant:
  whisper:
  cache-whisper:
  proxy_data:
  letsencrypt:
  mongodb:
  evolution:
  flowise:
  config-opencode:
  state-opencode:
  share-opencode:
  hermes:
  rabbitmq-lib:
  browser_data:

configs:
  searxng_inline_settings:
    content: |
      use_default_settings: true
      search:
        formats:
          - html
          - json

secrets:
  postgres_pass:
    file: ./secrets/pg_password.txt
  n8n_encryption_key:
    file: ./secrets/n8n_encryption_key.txt
  n8n_jwt_secret:
    file: ./secrets/n8n_jwt_secret.txt
  n8n_runners_token:
    file: ./secrets/n8n_runners_token.txt

################################################

services:
    postgres:
      <<: *postgres-base
      profiles: ["postgres", "n8n", "n8n-runner", "n8n-worker", "evolutionapi", "openwebui", "flowise"]

    redis:
      <<: *redis-base
      profiles: ["redis", "n8n", "n8n-runner", "n8n-worker", "evolutionapi", "openwebui", "flowise"]

    n8n:
      <<: *n8n-base
      hostname: ${nhostname}
      container_name: ${nhostname}
      profiles: ["n8n", "n8n-worker", "openaibridge"]
      ports:
        - ${N8N_PORT}:5678
        - ${N8N_PORT2}:5679
      healthcheck:
        test: ["CMD", "sh", "-c", "(wget -q -T 5 -O - http://127.0.0.1:5678/healthz 2>/dev/null | grep -qF '{\"status\":\"ok\"}') || exit 1"]
        start_period: 30s
        interval: 30s
        timeout: 10s
        retries: 3
      links:
        - redis
      depends_on:
        postgres:
          condition: service_healthy
          restart: true
        redis:
          condition: service_healthy
          restart: true

    n8n-worker:
      <<: *n8n-base
      hostname: ${workername}
      container_name: ${workername}
      profiles: ["n8n-worker", "n8n-runner"]
      command: worker
      healthcheck:
        test: ["CMD", "node", "-v"]
        start_period: 30s
        interval: 30s
        timeout: 10s
        retries: 3
      links:
        - redis
      depends_on:
        postgres:
          condition: service_healthy
          restart: true
        redis:
          condition: service_healthy
          restart: true
        n8n:
          condition: service_healthy
          restart: true

    n8n-runner:
      <<: *n8n-runner
      hostname: ${runnername}
      container_name: ${runnername}
      profiles: ["n8n-runner"]
      healthcheck:
        test: ["CMD", "node", "-v"]
        start_period: 30s
        interval: 30s
        timeout: 10s
        retries: 3
      links:
        - redis
      depends_on:
        postgres:
          condition: service_healthy
          restart: true
        redis:
          condition: service_healthy
          restart: true
        n8n-worker:
          condition: service_healthy
          restart: true

    qdrant:
      <<: *qdrant-base
      profiles: ["qdrant"]

    openwebui:
      <<: *openwebui-base
      profiles: ["openwebui", "openaibridge"]
      links:
        - redis
      depends_on:
        postgres:
          condition: service_healthy
          restart: true
        redis:
          condition: service_healthy
          restart: true

    openaibridge:
      <<: *openai-bridge
      profiles: ["openaibridge"]
      depends_on:
        openwebui:
          condition: service_healthy
          restart: true
        n8n:
          condition: service_healthy
          restart: true

    ollama-cpu:
      <<: *ollama-base
      profiles: ["ollama-cpu"]
      environment:
        - OLLAMA_DEBUG=${OLLAMA_DEBUG}
        - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE}
        - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS}
        - OLLAMA_MAX_QUEUE=${OLLAMA_MAX_QUEUE}
        - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL}
        - OLLAMA_NOPRUNE=${OLLAMA_NOPRUNE}
        - OLLAMA_SCHED_SPREAD=${OLLAMA_SCHED_SPREAD}
        - OLLAMA_FLASH_ATTENTION=${OLLAMA_FLASH_ATTENTION}
        - OLLAMA_KV_CACHE_TYPE=${OLLAMA_KV_CACHE_TYPE}
        - OLLAMA_LOAD_TIMEOUT=${OLLAMA_LOAD_TIMEOUT}
        - OLLAMA_MAX_QUEUE=${OLLAMA_MAX_QUEUE}
        - OLLAMA_CONTEXT_LENGTH=${OLLAMA_CONTEXT_LENGTH}

    ollama-gpu:
      <<: [*ollama-base, *nvidia-base]
      profiles: ["ollama-gpu"]
      environment:
        - NVIDIA_VISIBLE_DEVICES=all
        - NVIDIA_DRIVER_CAPABILITIES=all
        - OLLAMA_DEBUG=${OLLAMA_DEBUG}
        - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE}
        - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS}
        - OLLAMA_MAX_QUEUE=${OLLAMA_MAX_QUEUE}
        - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL}
        - OLLAMA_NOPRUNE=${OLLAMA_NOPRUNE}
        - OLLAMA_SCHED_SPREAD=${OLLAMA_SCHED_SPREAD}
        - OLLAMA_FLASH_ATTENTION=${OLLAMA_FLASH_ATTENTION}
        - OLLAMA_KV_CACHE_TYPE=${OLLAMA_KV_CACHE_TYPE}
        - OLLAMA_LOAD_TIMEOUT=${OLLAMA_LOAD_TIMEOUT}
        - OLLAMA_MAX_QUEUE=${OLLAMA_MAX_QUEUE}
        - OLLAMA_CONTEXT_LENGTH=${OLLAMA_CONTEXT_LENGTH}

    whisper-gpu:
      <<: [*whisper-base, *nvidia-base]
      image: onerahmet/openai-whisper-asr-webservice:latest-gpu
      profiles: ["whisper-gpu"]
      environment:
        - ASR_DEVICE=cuda
        - ASR_MODEL=${ASR_MODEL}
        - ASR_ENGINE=${ASR_ENGINE}
        - MODEL_IDLE_TIMEOUT=300
        - NVIDIA_VISIBLE_DEVICES=all
        - NVIDIA_DRIVER_CAPABILITIES=all

    whisper:
      <<: *whisper-base
      image: onerahmet/openai-whisper-asr-webservice:latest
      profiles: ["whisper"]
      environment:
        - ASR_DEVICE=cpu
        - ASR_MODEL=${ASR_MODEL}
        - ASR_ENGINE=${ASR_ENGINE}
        - MODEL_IDLE_TIMEOUT=300

    crawl4ai-amd64:
      <<: *crawl4ai-base
      image: unclecode/crawl4ai:all-amd64
      profiles: ["crawl4ai-amd64"]

    crawl4ai-arm64:
      <<: *crawl4ai-base
      image: unclecode/crawl4ai:all-arm64
      profiles: ["crawl4ai-arm64"]

    proxy:
      <<: *proxy-base
      profiles: ["proxy"]

    searxng:
      <<: *searxng-base
      profiles: ["searxng"]

    mongodb:
      <<: *mongodb-base
      profiles: [ "mongodb" ]

    evolutionapi:
      <<: *evolution-base
      profiles: [ "evolutionapi" ]
      links:
        - redis
      depends_on:
        postgres:
          condition: service_healthy
          restart: true
        redis:
          condition: service_healthy
          restart: true

    flowise:
        <<: *flowise-base
        profiles: ["flowise"]
        links:
          - redis
        depends_on:
          postgres:
            condition: service_healthy
            restart: true
          redis:
            condition: service_healthy
            restart: true

    opencode:
        <<: *opencode-base
        profiles: ["opencode"]

    hermes:
        <<: *hermes-base
        profiles: ["hermes"]

    rabbit:
        <<: *rabbit-base
        profiles: ["rabbit"]

    browserless:
        <<: *browserless-base
        profiles: ["browserless"]

