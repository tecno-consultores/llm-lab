x-proxy-base: &proxy-base
    image: jc21/nginx-proxy-manager:latest
    hostname: ${proxyhostname}
    container_name: ${proxyhostname}
    pull_policy: ${pull_policy}
    restart: ${restart}
    environment:
      - DISABLE_IPV6=${DISABLE_IPV6}
      - INITIAL_ADMIN_EMAIL=${INITIAL_ADMIN_EMAIL}
      - INITIAL_ADMIN_PASSWORD=${INITIAL_ADMIN_PASSWORD}
    ports:
      - 80:80
      - 443:443
      - ${pproxy}:81
    volumes:
      - proxy_data:/data
      - letsencrypt:/etc/letsencrypt
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    healthcheck:
      test: ["CMD", "/usr/bin/check-health"]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 3

x-searxng-base: &searxng-base
    image: docker.io/searxng/searxng:latest
    hostname: ${searxnghostname}
    container_name: ${searxnghostname}
    pull_policy: ${pull_policy}
    restart: ${restart}
    cap_drop:
      - ALL
#    ports:
#      - ${psearch}:8080
    environment:
#      - SEARXNG_BASE_URL=https://${SEARXNG_HOSTNAME}/ # uncomment to specify a static url
      - SEARXNG_LIMITER=false
      - SEARXNG_SECRET=${SEARXNG_SECRET}
      - UWSGI_WORKERS=${SEARXNG_UWSGI_WORKERS}
      - UWSGI_THREADS=${SEARXNG_UWSGI_THREADS}
    configs:
      - source: searxng_inline_settings
        target: /etc/searxng/settings.yml
    logging:
      driver: "json-file"
