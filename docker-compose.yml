      timeout: 10s
      retries: 3

x-qdrant-base: &qdrant-base
    image: qdrant/qdrant:latest
    hostname: ${qhostname}
    container_name: ${qhostname}
    pull_policy: ${pull_policy}
    restart: ${restart}
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=INFO
      - TZ=${TIMEZONE}
    ports:
      - ${qdrant}:6333
      - 6334:6334
