    container_name: ${clawhostname}
    pull_policy: ${pull_policy}
    restart: ${restart}
    init: true
    stdin_open: true
    tty: true
    ports:
      - ${CLAWPORT}:${CLAWPORT}
      - ${CLAWBRIDGE}:${CLAWBRIDGE}
#    command: [ "node", "dist/index.js", "gateway", "--bind", "${OPENCLAW_GATEWAY_BIND}", "--port", "${CLAWPORT}" ]
    environment:
      - HOME=/home/node
      #- OPENCLAW_GATEWAY_PASSWORD=${AUTH_PASSWORD}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - OPENCLAW_GATEWAY_PORT=${CLAWPORT}
      - OPENCLAW_BRIDGE_PORT=${CLAWBRIDGE}
      - OPENCLAW_INIT_GATEWAY_MODE=${OPENCLAW_INIT_GATEWAY_MODE}
      - TERM=xterm-256color
      - DOCKER_SOCKET_PATH=${DOCKER_SOCKET_PATH}
      - OPENCLAW_DOCKER_SOCKET=${DOCKER_SOCKET_PATH}
      - OPENCLAW_ALLOW_INSECURE_PRIVATE_WS=1
      - TZ=${TIMEZONE}
      - BROWSER=echo
      - OPENCLAW_GATEWAY_BIND=${OPENCLAW_GATEWAY_BIND}
      - OPENCLAW_LOG_LEVEL=info
      - OPENCLAW_GATEWAY_CONTROL_UI_ALLOWED_ORIGINS='["http://localhost:${CLAWPORT}"]' #change me
      - OPENCLAW_DANGEROUSLY_ALLOW_HOST_HEADER_ORIGIN_FALLBACK=true
      - OPENCLAW_LOAD_SHELL_ENV=1
      - OPENCLAW_SHELL_ENV_TIMEOUT_MS=15000
      #- RAW_SANDBOX_SETTING=${OPENCLAW_SANDBOX}
      #- SANDBOX_ENABLED=${OPENCLAW_SANDBOX}
      #- OPENCLAW_SANDBOX=${OPENCLAW_SANDBOX}
      #- OLLAMA_BASE_URL=${UOLLAMA}
      #- OLLAMA_API_KEY=${OLLAMA_API_KEY}
      #- OPENCLAW_PRIMARY_MODEL=${OPENCLAW_PRIMARY_MODEL}
      #- ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      #- OPENAI_API_KEY=${OPENAI_API_KEY}
      #- OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      #- GEMINI_API_KEY=${GEMINI_API_KEY}
      #- XAI_API_KEY=${XAI_API_KEY}
      #- GROQ_API_KEY=${GROQ_API_KEY}
      #- MISTRAL_API_KEY=${MISTRAL_API_KEY}
      #- CEREBRAS_API_KEY=${CEREBRAS_API_KEY}
      #- VENICE_API_KEY=${VENICE_API_KEY}
      #- MOONSHOT_API_KEY=${MOONSHOT_API_KEY}
      #- KIMI_API_KEY=${KIMI_API_KEY}
      #- MINIMAX_API_KEY=${MINIMAX_API_KEY}
      #- ZAI_API_KEY=${ZAI_API_KEY}
      #- AI_GATEWAY_API_KEY=${AI_GATEWAY_API_KEY}
      #- OPENCODE_API_KEY=${OPENCODE_API_KEY}
      #- SYNTHETIC_API_KEY=${SYNTHETIC_API_KEY}
      #- COPILOT_GITHUB_TOKEN=${COPILOT_GITHUB_TOKEN}
      #- XIAOMI_API_KEY=${XIAOMI_API_KEY}
      #- DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      #- AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      #- AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      #- AWS_REGION=${AWS_REGION}
      #- AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
      #- BEDROCK_PROVIDER_FILTER=${BEDROCK_PROVIDER_FILTER}
      #- TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      #- DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      #- SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      #- SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
      #- ZALO_BOT_TOKEN=${ZALO_BOT_TOKEN}
      #- OPENCLAW_TWITCH_ACCESS_TOKEN=${OPENCLAW_TWITCH_ACCESS_TOKEN}
      #- BRAVE_API_KEY=${BRAVE_API_KEY}
      #- PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY}
      #- FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
      #- ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      #- XI_API_KEY=${XI_API_KEY}
      #- DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
    volumes:
      - openclaw-data:/home/node/.openclaw
      - ./openclaw-workspace:/home/node/.openclaw/workspace
      - ${DOCKER_SOCKET_PATH}:/var/run/docker.sock
    group_add:
      - ${DOCKER_GID}
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))" ]
      start_period: 20s
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  ollama:
  openwebui:
  n8n_storage:
  n8n_backup:
  n8n_shared:
  postgres:
  redis:
  qdrant:
  kafka:
  whisper:
  cache-whisper:
  proxy_data:
  letsencrypt:
  mongodb:
  evolution:
  flowise:
  openclaw-data:

################################################

services:
    n8n-all:
      <<: *n8n-base
      hostname: ${nhostname}
      container_name: ${nhostname}
      profiles: ["n8n"]
      ports:
        - ${N8N_PORT}:5678
        - ${N8N_PORT2}:5679
      healthcheck:
        test: ["CMD", "sh", "-c", "(wget -q -T 5 -O - http://127.0.0.1:5678/healthz 2>/dev/null | grep -qF '{\"status\":\"ok\"}') || exit 1"]
        start_period: 1m00s
        interval: 5s
        timeout: 10s
        retries: 10
      links:
        - redis-all
      depends_on:
        postgres-all:
          condition: service_healthy
          restart: true
        redis-all:
          condition: service_healthy
          restart: true

    n8n-worker:
      <<: *n8n-base
      hostname: ${workername}
      container_name: ${workername}
      profiles: ["n8n-worker"]
      command: worker
      healthcheck:
        test: ["CMD", "node", "-v"]
        start_period: 1m00s
        interval: 5s
        timeout: 10s
        retries: 10
      links:
        - redis-all
      depends_on:
        postgres-all:
          condition: service_healthy
          restart: true
        redis-all:
          condition: service_healthy
          restart: true
        n8n-all:
          condition: service_healthy
          restart: true

    n8n-runner:
      <<: *n8n-runner
      hostname: ${runnername}
      container_name: ${runnername}
      profiles: ["n8n-runner"]
      healthcheck:
        test: ["CMD", "node", "-v"]
        start_period: 1m00s
        interval: 5s
        timeout: 10s
        retries: 10
      links:
        - redis-all
      depends_on:
        postgres-all:
          condition: service_healthy
          restart: true
        redis-all:
          condition: service_healthy
          restart: true
        n8n-worker:
          condition: service_healthy
          restart: true

    postgres-all:
      <<: *postgres-base
      profiles: ["n8n", "evolutionapi", "n8n-worker", "postgres-all"]

    redis-all:
      <<: *redis-base
      profiles: ["n8n", "openwebui", "evolutionapi", "n8n-worker", "redis-all"]

    qdrant-all:
      <<: *qdrant-base
      profiles: ["qdrant"]

    openwebui-all:
      <<: *openwebui-base
      profiles: ["openwebui"]
      links:
        - redis-all
      depends_on:
        redis-all:
          condition: service_healthy
          restart: true
        postgres-all:
          condition: service_healthy
          restart: true

    n8n-openai-bridge-all:
      <<: *openai-bridge
      profiles: ["openaibridge"]
      depends_on:
        openwebui-all:
          condition: service_healthy
          restart: true
        n8n-all:
          condition: service_healthy
          restart: true

    kafka-all:
      <<: *kafka-base
      profiles: ["kafka"]

    ollama-others:
      <<: *ollama-base
      profiles: ["ollama-cpu"]
      environment:
        - OLLAMA_DEBUG=${OLLAMA_DEBUG}
        - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE}
        - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS}
        - OLLAMA_MAX_QUEUE=${OLLAMA_MAX_QUEUE}
        - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL}
        - OLLAMA_NOPRUNE=${OLLAMA_NOPRUNE}
        - OLLAMA_SCHED_SPREAD=${OLLAMA_SCHED_SPREAD}
        - OLLAMA_FLASH_ATTENTION=${OLLAMA_FLASH_ATTENTION}
        - OLLAMA_KV_CACHE_TYPE=${OLLAMA_KV_CACHE_TYPE}
        - OLLAMA_LOAD_TIMEOUT=${OLLAMA_LOAD_TIMEOUT}
        - OLLAMA_MAX_QUEUE=${OLLAMA_MAX_QUEUE}

    ollama-nvidia:
      <<: [*ollama-base, *nvidia-base]
      profiles: ["ollama-gpu"]
      environment:
        - NVIDIA_VISIBLE_DEVICES=all
        - NVIDIA_DRIVER_CAPABILITIES=compute,utility,video
        - OLLAMA_DEBUG=${OLLAMA_DEBUG}
        - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE}
        - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS}
        - OLLAMA_MAX_QUEUE=${OLLAMA_MAX_QUEUE}
        - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL}
        - OLLAMA_NOPRUNE=${OLLAMA_NOPRUNE}
        - OLLAMA_SCHED_SPREAD=${OLLAMA_SCHED_SPREAD}
        - OLLAMA_FLASH_ATTENTION=${OLLAMA_FLASH_ATTENTION}
        - OLLAMA_KV_CACHE_TYPE=${OLLAMA_KV_CACHE_TYPE}
        - OLLAMA_LOAD_TIMEOUT=${OLLAMA_LOAD_TIMEOUT}
        - OLLAMA_MAX_QUEUE=${OLLAMA_MAX_QUEUE}

    whisper-nvidia:
      <<: [*whisper-base, *nvidia-base]
      image: onerahmet/openai-whisper-asr-webservice:latest-gpu
      profiles: ["whisper-gpu"]
      environment:
        - ASR_DEVICE=cuda
        - ASR_MODEL=${ASR_MODEL}
        - ASR_ENGINE=${ASR_ENGINE}
        - MODEL_IDLE_TIMEOUT=300

    whisper-cpu:
      <<: *whisper-base
      image: onerahmet/openai-whisper-asr-webservice:latest
      profiles: ["whisper"]
      environment:
        - ASR_DEVICE=cpu
        - ASR_MODEL=${ASR_MODEL}
        - ASR_ENGINE=${ASR_ENGINE}
        - MODEL_IDLE_TIMEOUT=300

    crawl4ai-amd64:
      <<: *crawl4ai-base
      image: unclecode/crawl4ai:all-amd64
      profiles: ["crawl4ai-amd64"]

    crawl4ai-arm:
      <<: *crawl4ai-base
      image: unclecode/crawl4ai:all-arm64
      profiles: ["crawl4ai-arm64"]

    proxy:
      <<: *proxy-base
      profiles: ["proxy"]

    searxng:
      <<: *searxng-base
      profiles: ["searxng"]

    mongodb:
      <<: *mongodb-base
      profiles: [ "mongodb" ]

    evolutionapi:
      <<: *evolution-base
      profiles: [ "evolutionapi" ]
      links:
        - redis-all
      depends_on:
        postgres-all:
          condition: service_healthy
          restart: true
        redis-all:
          condition: service_healthy
          restart: true

    flowise-all:
        <<: *flowise-base
        profiles: ["flowise"]
        links:
          - redis-all
        depends_on:
          postgres-all:
            condition: service_healthy
            restart: true
          redis-all:
            condition: service_healthy
            restart: true

    opencode-all:
        <<: *opencode-base
        profiles: ["opencode"]

    openclaw-all:
        <<: *openclaw-base
        profiles: ["openclaw"]
