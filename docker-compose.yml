      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          memory: 1G
    healthcheck:
      test: ["CMD", "./qdrant", "-V"]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 3

